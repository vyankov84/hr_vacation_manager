{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-calendar3"></i> Annual Calendar {{ year }}</h1>
        <div>
            <span class="badge bg-success">Approved Leave</span>
            <span class="badge bg-secondary opacity-50">Other Months</span>
        </div>
    </div>

    <div class="row">
        {% for month in calendar %}
        <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center fw-bold">
                    {{ month.name }}
                </div>
                <div class="card-body p-2">
                    <table class="table table-sm table-bordered mb-0" style="font-size: 0.8rem;">
                        <thead class="table-light text-center">
                            <tr>
                                <th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th class="text-danger">S</th><th class="text-danger">S</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for week in month.weeks %}
                            <tr>
                                {% for day in week %}
                                    <td class="text-center
                                        {% if day in vacation_days %} bg-success text-white fw-bold {% endif %}
                                        {% if day.month != month.num %} text-muted opacity-25 {% endif %}">
                                        {{ day.day }}
                                    </td>
                                {% endfor %}
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .calendar-table td { height: 35px; vertical-align: middle; }
    .card { border: none; transition: transform 0.2s; }
    .card:hover { transform: scale(1.02); }
</style>
{% endblock %}
