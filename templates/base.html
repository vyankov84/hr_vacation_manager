<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR Vacations{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-width: 280px;
            max-width: 280px;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div class="d-flex">

        {% include 'common/nav.html' %}

                {% block content %}
                {% endblock %}
            </div>

        {% include 'common/footer.html' %}

        </main>

    </div>

</html>
